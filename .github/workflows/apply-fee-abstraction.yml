name: Apply Fee Abstraction

on:
  # Trigger manually from the Actions UI, optionally overriding inputs
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Branch to apply fee abstraction commits onto"
        required: true
        default: "main"
      source_ref:
        description: "Ref/branch that contains the commits listed in fee-abstraction-commits.txt (leave blank if already in history)"
        required: false
        default: ""
      pr_title:
        description: "Title for the resulting PR"
        required: false
        default: "feat: apply fee abstraction changes"
      squash:
        description: "Squash all cherry-picked commits into one"
        type: boolean
        required: false
        default: true


jobs:
  apply-fee-abstraction:
    name: Cherry-pick & squash fee abstraction
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_branch || 'main' }}
          fetch-depth: 0          # need full history for cherry-pick
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch source ref (if provided)
        if: ${{ github.event.inputs.source_ref != '' }}
        run: git fetch origin ${{ github.event.inputs.source_ref }}

      - name: Create working branch
        id: branch
        run: |
          BRANCH="chore/fee-abstraction-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Apply fee abstraction commits
        run: |
          NO_SQUASH_FLAG=""
          if [[ "${{ github.event.inputs.squash }}" == "false" ]]; then
            NO_SQUASH_FLAG="--no-squash"
          fi
          bash scripts/apply-fee-abstraction.sh $NO_SQUASH_FLAG

      - name: Push working branch
        run: git push origin ${{ steps.branch.outputs.name }}

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_TITLE="${{ github.event.inputs.pr_title || 'feat: apply fee abstraction changes' }}"
          TARGET="${{ github.event.inputs.target_branch || 'main' }}"
          COMMITS_SUMMARY="$(grep -Ev '^\s*(#|$)' scripts/fee-abstraction-commits.txt | awk '{print "- " $0}')"

          gh pr create \
            --base "$TARGET" \
            --head "${{ steps.branch.outputs.name }}" \
            --title "$PR_TITLE" \
            --body "$(cat <<EOF
          ## Fee Abstraction — automated cherry-pick

          This PR was created automatically by the **Apply Fee Abstraction** workflow.

          ### Commits applied
          \`\`\`
          $COMMITS_SUMMARY
          \`\`\`

          ### How to update the commit list
          Edit [\`scripts/fee-abstraction-commits.txt\`](../../blob/main/scripts/fee-abstraction-commits.txt) and re-run the workflow.

          ---
          _Generated by [apply-fee-abstraction workflow](.github/workflows/apply-fee-abstraction.yml)_
          EOF
          )"
